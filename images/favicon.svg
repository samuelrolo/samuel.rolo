<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background rounded square -->
  <rect x="2" y="2" width="96" height="96" rx="14" ry="14" fill="#1a1a2e"/>
  <!-- Diamond outer (gold) -->
  <polygon points="50,12 88,50 50,88 12,50" fill="#C9A84C"/>
  <!-- Diamond inner (dark) -->
  <polygon points="50,19 81,50 50,81 19,50" fill="#1a1a2e"/>
  <!-- Letter S -->
  <text x="50" y="66" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="42" 
        font-weight="900" 
        text-anchor="middle" 
        fill="#C9A84C"
        letter-spacing="-1">S</text>
</svg>