<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Share2Inspire | Algo correu mal</title>
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#1a1a2e" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" />
    <style>
      :root {
        --bg: #1a1a2e;
        --bg-deep: #11111f;
        --panel: rgba(255, 255, 255, 0.04);
        --panel-border: rgba(255, 255, 255, 0.08);
        --text: #f8f8fb;
        --text-soft: rgba(248, 248, 251, 0.8);
        --text-muted: rgba(248, 248, 251, 0.58);
        --accent: #c9a961;
        --accent-hover: #d8b66b;
        --shadow: 0 28px 80px rgba(0, 0, 0, 0.38);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "Poppins", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(201, 169, 97, 0.12), transparent 28%),
          linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .wrap {
        width: 100%;
        max-width: 720px;
      }

      .card {
        border-radius: 28px;
        border: 1px solid var(--panel-border);
        background: var(--panel);
        backdrop-filter: blur(14px);
        box-shadow: var(--shadow);
        padding: 56px 32px;
        text-align: center;
      }

      .emoji {
        margin: 0 0 22px;
        font-size: clamp(3.8rem, 10vw, 5.8rem);
        line-height: 1;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 4.4vw, 3rem);
        line-height: 1.15;
        letter-spacing: -0.03em;
      }

      .subtitle {
        margin: 18px auto 0;
        max-width: 34rem;
        color: var(--text-soft);
        font-size: 1rem;
        line-height: 1.8;
      }

      .actions {
        margin-top: 32px;
      }

      .button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 14px 24px;
        min-width: 164px;
        font: inherit;
        font-weight: 600;
        color: #17141f;
        background: var(--accent);
        cursor: pointer;
        transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
        box-shadow: 0 16px 34px rgba(201, 169, 97, 0.18);
      }

      .button:hover {
        background: var(--accent-hover);
        transform: translateY(-1px);
      }

      .button:focus-visible {
        outline: 2px solid #ffffff;
        outline-offset: 3px;
      }

      .contact {
        margin-top: 28px;
        color: var(--text-muted);
        font-size: 0.9rem;
        line-height: 1.7;
      }

      .contact a {
        color: var(--text-soft);
        text-decoration: none;
      }

      .contact a:hover {
        color: var(--accent);
      }

      @media (max-width: 640px) {
        body {
          padding: 16px;
        }

        .card {
          padding: 44px 22px;
          border-radius: 24px;
        }

        .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card" aria-labelledby="page-title">
        <p class="emoji" aria-hidden="true">😕</p>
        <h1 id="page-title">Algo correu mal / Something went wrong</h1>
        <p class="subtitle">
          The page you are trying to reach is not available right now. You can return to the previous page and continue browsing Share2Inspire.
        </p>
        <div class="actions">
          <button
            class="button"
            type="button"
            onclick="if (window.history.length > 1) { window.history.back(); } else { window.location.href = 'https://www.share2inspire.pt'; }">
            Go back
          </button>
        </div>
        <p class="contact">Need help? <a href="mailto:hello@share2inspire.pt">hello@share2inspire.pt</a></p>
      </section>
    </main>
  </body>
</html>
